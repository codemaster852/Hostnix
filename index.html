<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostNix | Multi-Page Deploy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        const SUPABASE_URL = 'https://zncztttvefahofdeacxf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_GhwVsgutWW4EpK9Fc_3DQQ_pW_R48LM';
        window.supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-6">

    <main class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">HostNix</h1>
        
        <form id="deployForm" class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Project URL</label>
                <div class="flex items-center bg-slate-950 border border-slate-700 rounded-lg overflow-hidden">
                    <span class="px-4 text-slate-500">https://hostnix.vercel.app/</span>
                    <input type="text" id="slug" required placeholder="my-project" class="w-full bg-transparent p-3 outline-none">
                </div>
            </div>

            <div id="fileManager" class="space-y-4">
                <div class="flex justify-between items-center">
                    <label class="block text-sm font-medium">Files</label>
                    <button type="button" onclick="addFileField()" class="text-blue-400 text-sm hover:underline">+ Add Another File</button>
                </div>
                <div id="filesContainer" class="space-y-4">
                    <!-- File template row -->
                    <div class="file-row flex gap-2">
                        <input type="text" placeholder="filename.html" class="filename w-1/4 bg-slate-950 border border-slate-700 rounded-lg p-3 outline-none" value="index.html">
                        <textarea placeholder="File content" class="filecontent w-3/4 bg-slate-950 border border-slate-700 rounded-lg p-3 outline-none font-mono text-sm" rows="3"></textarea>
                    </div>
                </div>
            </div>

            <button type="submit" id="deployBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold transition-all">
                Deploy Website
            </button>
        </form>

        <div id="result" class="hidden mt-6 p-6 bg-green-900/20 border border-green-800 rounded-xl">
            <h3 class="text-green-400 font-bold mb-2">Deployment Successful!</h3>
            <p id="deployLink" class="text-sm font-mono break-all"></p>
        </div>
    </main>

    <script>
        function addFileField() {
            const container = document.getElementById('filesContainer');
            const div = document.createElement('div');
            div.className = 'file-row flex gap-2';
            div.innerHTML = `
                <input type="text" placeholder="page.html" class="filename w-1/4 bg-slate-950 border border-slate-700 rounded-lg p-3 outline-none">
                <textarea placeholder="File content" class="filecontent w-3/4 bg-slate-950 border border-slate-700 rounded-lg p-3 outline-none font-mono text-sm" rows="3"></textarea>
            `;
            container.appendChild(div);
        }

        const form = document.getElementById('deployForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('deployBtn');
            btn.disabled = true;
            btn.innerText = 'Deploying...';

            const slug = document.getElementById('slug').value.toLowerCase().replace(/\s+/g, '-');
            const fileRows = document.querySelectorAll('.file-row');
            const files = Array.from(fileRows).map(row => ({
                name: row.querySelector('.filename').value,
                content: row.querySelector('.filecontent').value
            }));

            try {
                const { error } = await window.supabase.from('apps').insert([{ slug, files }]);
                if (error) throw error;
                
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('deployLink').innerText = `Your site is live at: https://hostnix.vercel.app/${slug}`;
            } catch (err) {
                alert('Deployment failed: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Deploy Website';
            }
        });
    </script>
</body>
</html>
